<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiseled Hearts | Basic Clothing</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none' stroke='%232C3539' stroke-width='8'><line x1='10' y1='10' x2='90' y2='10'/><line x1='10' y1='10' x2='10' y2='90'/><line x1='10' y1='90' x2='90' y2='90'/><line x1='90' y1='10' x2='90' y2='40'/><line x1='90' y1='60' x2='90' y2='90'/></svg>">

    <style>
        /* --- CSS STYLES --- */
        :root {
            --charcoal: #2C3539;
            --off-white: #F8F9FA;
            --clay: #C4A482;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--off-white);
            color: var(--charcoal);
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Navigation & Header Logo */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background-color: var(--off-white);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eaeaea;
        }

        .logo-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--charcoal);
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--clay);
        }

        /* Hero Section */
        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2.5rem;
        }

        .btn {
            padding: 15px 40px;
            background-color: var(--charcoal);
            color: var(--off-white);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #1a1f22;
        }

        /* Featured Section */
        .featured {
            padding: 5rem 5%;
        }

        .section-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        .shopify-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem;
            background-color: var(--charcoal);
            color: var(--off-white);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-brand">
            <svg class="logo-icon" viewBox="0 0 100 100" fill="none" stroke="#2C3539" stroke-width="6">
                <line x1="10" y1="10" x2="90" y2="10" />
                <line x1="10" y1="10" x2="10" y2="90" />
                <line x1="10" y1="90" x2="90" y2="90" />
                <line x1="90" y1="10" x2="90" y2="40" />
                <line x1="90" y1="60" x2="90" y2="90" />
            </svg>
            <span class="logo-text">CHISELED HEARTS</span>
        </div>

        <ul class="nav-links">
            <li><a href="#shop">Shop</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </header>

    <section class="hero">
        <svg class="hero-logo" viewBox="0 0 100 100" fill="none" stroke="#2C3539" stroke-width="4">
            <line x1="10" y1="10" x2="90" y2="10" />
            <line x1="10" y1="10" x2="10" y2="90" />
            <line x1="10" y1="90" x2="90" y2="90" />
            <line x1="90" y1="10" x2="90" y2="40" />
            <line x1="90" y1="60" x2="90" y2="90" />
        </svg>

        <h1>Chiseled Hearts</h1>
        <p>Nothing extra. Just what matters. Premium basics for an uncomplicated life.</p>
        <a href="#shop" class="btn">Shop The Collection</a>
    </section>

        </div>
    </section>

    <footer>
        <p>&copy; <span id="year"></span> CHISELED HEARTS. All rights reserved.</p>
    </footer>

    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
